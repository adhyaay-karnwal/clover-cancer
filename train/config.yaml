# Training Configuration for Clover Cancer
#
# Two training paths:
#   1. Local (Apple Silicon MPS): python train/fine_tune.py — uses transformers+peft+trl, float16
#   2. Kaggle (T4 GPU): notebooks/train_clover_cancer.ipynb — uses Unsloth, 4-bit quantization
#
# This config is the source of truth for hyperparameters used in both paths.

# Model
model:
  name: "google/gemma-4-e2b-it"           # HuggingFace model ID
  unsloth_name: "unsloth/gemma-4-e2b-it"  # Unsloth pre-quantized model (for Kaggle)
  max_seq_length: 2048

# LoRA
lora:
  r: 16
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"

# Training hyperparameters (shared across both paths)
training:
  output_dir: "outputs"
  num_train_epochs: 3
  per_device_train_batch_size: 2      # Kaggle T4 (Unsloth)
  gradient_accumulation_steps: 8      # Effective batch = 16
  learning_rate: 0.0002
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  logging_steps: 5
  save_strategy: "epoch"
  eval_strategy: "epoch"
  optim: "adamw_8bit"                 # Kaggle T4 (Unsloth) — falls back to adamw_torch on MPS
  max_grad_norm: 0.3
  seed: 3407

# Data
data:
  train_file: "data/processed/train.json"
  val_file: "data/processed/val.json"
  test_file: "data/processed/test.json"
  max_samples: null  # Use all

# Output
output:
  save_model: true
  push_to_hub: false
  hub_model_id: "adhyaay-karnwal/clover-cancer-gemma4"
  export_gguf: true
  gguf_quantization: "q4_k_m"
